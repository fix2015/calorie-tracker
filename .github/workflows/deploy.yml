name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write env files
        run: |
          echo "${{ secrets.INFRA_ENV }}" | base64 -d > infra/.env
          echo "${{ secrets.BACKEND_ENV }}" | base64 -d > infra/backend.env

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"

          # Ensure app directory exists and pull latest
          ${SSH_CMD} "sudo mkdir -p /opt/calorie-tracker && sudo chown \$(whoami):\$(whoami) /opt/calorie-tracker"
          ${SSH_CMD} "cd /opt/calorie-tracker && (git rev-parse --git-dir > /dev/null 2>&1 && git fetch origin main && git reset --hard origin/main || git clone https://github.com/fix2015/calorie-tracker.git .)"

          # Copy env files
          scp -i ~/.ssh/deploy_key infra/.env ${SSH_USER}@${SSH_HOST}:/opt/calorie-tracker/infra/.env
          scp -i ~/.ssh/deploy_key infra/backend.env ${SSH_USER}@${SSH_HOST}:/opt/calorie-tracker/infra/backend.env

          # Login to GHCR, pull and restart
          ${SSH_CMD} "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u fix2015 --password-stdin"
          ${SSH_CMD} "cd /opt/calorie-tracker/infra && docker compose -f docker-compose.prod.yml pull"
          ${SSH_CMD} "cd /opt/calorie-tracker/infra && docker compose -f docker-compose.prod.yml down --remove-orphans"
          ${SSH_CMD} "cd /opt/calorie-tracker/infra && docker compose -f docker-compose.prod.yml up -d"
          ${SSH_CMD} "docker image prune -f"

          # Health check
          for i in $(seq 1 24); do
            if ${SSH_CMD} "curl -sf http://127.0.0.1:3001/api/health > /dev/null 2>&1"; then
              echo "Backend healthy!"
              break
            fi
            echo "Waiting for backend... ($i/24)"
            sleep 5
          done

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
