<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Fork + Knife crossed (plate icon) -->
  <g transform="translate(256,256) scale(0.55)" filter="url(#shadow)">
    <!-- Plate circle -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="12"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>
    <!-- Lightning bolt (food energy) -->
    <path d="M 20 -180 L -60 -10 L 10 -10 L -30 180 L 80 -20 L 10 -20 Z"
          fill="url(#bolt)" stroke="none"/>
  </g>
  <!-- Small leaf accent -->
  <g transform="translate(350, 130) rotate(-30)">
    <path d="M 0 0 Q 30 -40 10 -70 Q -10 -40 0 0 Z" fill="#34D399" opacity="0.9"/>
    <line x1="0" y1="0" x2="5" y2="-35" stroke="#059669" stroke-width="2" opacity="0.7"/>
  </g>
</svg>
