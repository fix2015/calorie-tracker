version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calorie_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-calorie_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calorie_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - calorie_net

  backend:
    image: ghcr.io/fix2015/calorie-tracker/backend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-calorie_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-calorie_tracker}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - calorie_net

  frontend:
    image: ghcr.io/fix2015/calorie-tracker/frontend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:80"
    networks:
      - calorie_net

volumes:
  pgdata:
  uploads:

networks:
  calorie_net:
    driver: bridge
