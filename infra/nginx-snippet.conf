# ============================================================
# Nginx server block for calories.probooking.app
# Place this as /etc/nginx/sites-available/calories.probooking.app
# then: ln -s /etc/nginx/sites-available/calories.probooking.app /etc/nginx/sites-enabled/
# then: sudo certbot --nginx -d calories.probooking.app
# then: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name calories.probooking.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name calories.probooking.app;

    # SSL certs will be added by certbot
    # ssl_certificate /etc/letsencrypt/live/calories.probooking.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/calories.probooking.app/privkey.pem;

    client_max_body_size 10m;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Uploaded photos
    location /uploads/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
