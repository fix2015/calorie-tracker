# ============================================================
# ADD THIS inside the main HTTPS server block in
# /etc/nginx/sites-available/probooking.app
# (inside: server { listen 443 ssl; server_name probooking.app; ... })
# ============================================================

    # Calorie Tracker API
    location /calories/api/ {
        rewrite ^/calories/api/(.*) /api/$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # Calorie Tracker uploaded photos
    location /calories/uploads/ {
        rewrite ^/calories/uploads/(.*) /uploads/$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # Calorie Tracker Frontend
    location /calories/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /calories {
        return 301 /calories/;
    }
